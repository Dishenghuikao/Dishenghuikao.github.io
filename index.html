<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>德州市地生会考成绩查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 顶部蓝色导航 */
        .header {
            width: 100%;
            height: 60px;
            background-color: #165DFF;
            color: #fff;
            line-height: 60px;
            text-align: center;
            font-size: 20px;
        }
        /* 主体白色区域 */
        .main {
            width: 520px;
            margin: 60px auto;
            background: #ffffff;
            border: 1px solid #e5edf7;
            padding: 40px;
            border-radius: 4px;
        }
        .title {
            text-align: center;
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }
        .item {
            margin: 18px 0;
        }
        .item label {
            display: inline-block;
            width: 110px;
            font-size: 15px;
            color: #444;
        }
        .item input {
            width: 280px;
            height: 38px;
            border: 1px solid #ccc;
            padding: 0 10px;
            font-size: 15px;
        }
        /* 按钮样式 */
        .btn-box {
            text-align: center;
            margin-top: 30px;
        }
        #search {
            width: 120px;
            height: 42px;
            background: #165DFF;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 15px;
        }
        #reset {
            width: 120px;
            height: 42px;
            background: #999;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 3px;
        }
        /* 结果区域 */
        .result {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            display: none;
        }
        /* 底部浅蓝版权 */
        .footer {
            width: 100%;
            height: 50px;
            background-color: #e8f2ff;
            text-align: center;
            line-height: 50px;
            font-size: 13px;
            color: #666;
            position: fixed;
            bottom: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        德州市教育和体育局 地生会考成绩查询平台
    </div>

    <div class="main">
        <div class="title">2026年地理生物学业水平考试成绩查询</div>

        <div class="item">
            <label>准考证号：</label>
            <input type="text" id="zkz" placeholder="请输入10位准考证号">
        </div>
        <div class="item">
            <label>考生姓名：</label>
            <input type="text" id="name" placeholder="请输入姓名">
        </div>
        <div class="item">
            <label>身份证后6位：</label>
            <input type="text" id="idcard" placeholder="身份证号码后六位">
        </div>

        <div class="btn-box">
            <button id="search">立即查询</button>
            <button id="reset">清空重置</button>
        </div>

        <!-- 查询结果展示（可自行修改分数） -->
        <div class="result" id="resBox">
            <h3 style="text-align:center;margin-bottom:15px;">考生成绩信息</h3>
            <p>姓名：<span id="r-name"></span></p>
            <p>准考证号：<span id="r-zkz"></span></p>
            <p>地理成绩：<span id="dl-score"></span> 分</p>
            <p>生物成绩：<span id="sw-score"></span> 分</p>
            <p>等级：<span id="dj"></span></p>
        </div>
    </div>

    <div class="footer">
        版权所有：德州市教育信息中心 | 温馨提示：仅支持本年度会考查询
    </div>

    <script>
        // 查询点击事件
        document.getElementById('search').onclick = function(){
            let name = document.getElementById('name').value;
            let zkz = document.getElementById('zkz').value;
            if(name && zkz){
                document.getElementById('resBox').style.display = 'block';
                document.getElementById('r-name').innerText = name;
                document.getElementById('r-zkz').innerText = zkz;
                // 这里可以手动固定分数，也可以随机
                let dl = Math.floor(Math.random()*20 + 80);
                let sw = Math.floor(Math.random()*20 + 80);
                document.getElementById('dl-score').innerText = dl;
                document.getElementById('sw-score').innerText = sw;
                let total = dl + sw;
                if(total >= 170) document.getElementById('dj').innerText = 'A';
                else if(total >=150) document.getElementById('dj').innerText = 'B';
                else document.getElementById('dj').innerText = 'C';
            }else{
                alert('请填写完整信息');
            }
        }
        // 重置按钮
        document.getElementById('reset').onclick = function(){
            document.getElementById('zkz').value = '';
            document.getElementById('name').value = '';
            document.getElementById('idcard').value = '';
            document.getElementById('resBox').style.display = 'none';
        }
    </script>
</body>
</html>
