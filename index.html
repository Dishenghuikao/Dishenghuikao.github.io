<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州市初中学业水平考试成绩查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            position: relative;
            background: #fff;
            min-height: 100vh;
        }
        /* 全局水印 */
        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg width='300' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='0' y='30' font-size='22' fill='black' transform='rotate(-25)'%3E德州地生会考查询%3C/text%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        .header-bar {
            background: #4299e1;
            padding: 35px 15px;
            text-align: center;
        }
        .header-bar h1 {
            color: #fff;
            font-size: 22px;
            font-weight: normal;
        }
        .container {
            width: 92%;
            margin: 40px auto;
        }
        /* 查询表单样式 */
        #queryBox {
            display: block;
        }
        .form-item {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
        }
        .form-item label {
            width: 110px;
            color: #224477;
            font-size: 16px;
        }
        .form-item input {
            flex: 1;
            height: 38px;
            border: 1px solid #ccc;
            padding: 0 10px;
            font-size: 16px;
        }
        .code-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #codeImg {
            padding: 6px 12px;
            background: #eee;
            letter-spacing: 4px;
            font-size: 20px;
            color: #0066cc;
            border: 1px solid #ccc;
            user-select: none;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }
        button {
            flex: 1;
            height: 44px;
            border: none;
            border-radius: 3px;
            font-size: 17px;
            cursor: pointer;
        }
        #queryBtn, #resetBtn, #backBtn {
            background: #ffaa22;
            color: white;
        }
        /* 成绩结果样式 */
        #resultBox {
            display: none;
        }
        .box {
            width: 94%;
            margin: 25px auto;
            border: 1px solid #ddd;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid #ddd;
        }
        .row3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }
        .cell {
            padding: 12px;
            border-right: 1px solid #ddd;
            font-size: 15px;
        }
        .cell:last-child {
            border-right: none;
        }
        .title-cell {
            background: #f0f2f5;
            font-weight: bold;
        }
        .exit-wrap {
            text-align: center;
            margin: 25px 0;
        }
        .footer-text {
            background: #4299e1;
            color: white;
            text-align: center;
            padding: 30px 10px;
            font-size: 13px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <!-- 水印 -->
    <div class="watermark"></div>

    <div class="header-bar">
        <h1>德州市初中学业水平考试成绩查询</h1>
    </div>

    <!-- 查询表单区域 -->
    <div id="queryBox" class="container">
        <div class="form-item">
            <label>考生姓名：</label>
            <input type="text" id="userNameInput" placeholder="请输入汉字姓名">
        </div>
        <div class="form-item">
            <label>准考证号：</label>
            <input type="text" id="zkzh" placeholder="请输入10位纯数字准考证号">
        </div>
        <div class="form-item">
            <label>身份证号后四位：</label>
            <input type="text" id="id4" placeholder="请输入身份证最后4位数字">
        </div>
        <div class="form-item code-row">
            <label>验证码：</label>
            <input type="text" id="vcode" placeholder="输入验证码">
            <span id="codeImg"></span>
        </div>
        <div class="btn-group">
            <button id="queryBtn">查询</button>
            <button id="resetBtn">重置</button>
        </div>
    </div>

    <!-- 成绩结果区域 -->
    <div id="resultBox">
        <div class="box">
            <div class="row">
                <div class="cell title-cell">姓名</div>
                <div class="cell" id="showUserName"></div>
            </div>
            <div class="row">
                <div class="cell title-cell">准考证号</div>
                <div class="cell" id="zkNum"></div>
            </div>
            <div class="row">
                <div class="cell title-cell">身份证后四位</div>
                <div class="cell" id="idNum"></div>
            </div>
            <div class="row row3">
                <div class="cell title-cell">科目</div>
                <div class="cell title-cell">成绩</div>
                <div class="cell title-cell">等级</div>
            </div>
            <div class="row row3">
                <div class="cell">地理</div>
                <div class="cell" id="geoScore"></div>
                <div class="cell" id="geoLevel"></div>
            </div>
            <div class="row row3">
                <div class="cell">生物</div>
                <div class="cell" id="bioScore"></div>
                <div class="cell" id="bioLevel"></div>
            </div>
        </div>
        <div class="exit-wrap">
            <button id="backBtn" style="width:130px;">退出</button>
        </div>
        <div class="footer-text">
            版权所有：德州市教育局<br>
            技术支持：本地查询系统
        </div>
    </div>

    <script>
        // 验证码
        let trueCode = "";
        function createCode() {
            const str = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            trueCode = "";
            for(let i=0;i<4;i++){
                trueCode += str[Math.floor(Math.random()*str.length)];
            }
            document.getElementById("codeImg").innerText = trueCode;
        }
        createCode();
        document.getElementById("codeImg").onclick = createCode;

        // 正则规则
        const nameReg = /^[\u4e00-\u9fa5]+$/; // 只能汉字姓名
        const zkReg = /^\d{10}$/;    // 10位数字准考证
        const idReg = /^\d{4}$/;     // 身份证后四位数字

        // 查询按钮
        document.getElementById("queryBtn").onclick = function(){
            let name = document.getElementById("userNameInput").value.trim();
            let zk = document.getElementById("zkzh").value.trim();
            let id4 = document.getElementById("id4").value.trim();
            let code = document.getElementById("vcode").value.trim().toUpperCase();

            // 姓名校验
            if(!nameReg.test(name)){
                alert("请输入正确的汉字姓名，不能包含数字和符号");
                return;
            }
            if(!zkReg.test(zk)){
                alert("请输入正确的10位纯数字准考证号");
                return;
            }
            if(!idReg.test(id4)){
                alert("请输入正确的身份证后四位数字");
                return;
            }
            if(code !== trueCode){
                alert("验证码错误，请点击图片更换验证码");
                createCode();
                return;
            }

            // 切换页面显示
            document.getElementById("queryBox").style.display = "none";
            document.getElementById("resultBox").style.display = "block";

            // 填充用户输入的信息
            document.getElementById("showUserName").innerText = name;
            document.getElementById("zkNum").innerText = zk;
            document.getElementById("idNum").innerText = id4;

            // 随机分数 80~90
            function getScore(){
                return Math.floor(Math.random() * 11) + 80;
            }
            // 随机等级 A/B
            function getLevel(){
                return Math.random() > 0.5 ? "A" : "B";
            }

            document.getElementById("geoScore").innerText = getScore();
            document.getElementById("geoLevel").innerText = getLevel();
            document.getElementById("bioScore").innerText = getLevel();
            document.getElementById("bioScore").innerText = getScore();
            document.getElementById("bioLevel").innerText = getLevel();
        }

        // 重置按钮
        document.getElementById("resetBtn").onclick = function(){
            document.getElementById("userNameInput").value = "";
            document.getElementById("zkzh").value = "";
            document.getElementById("id4").value = "";
            document.getElementById("vcode").value = "";
            createCode();
        }

        // 返回退出按钮
        document.getElementById("backBtn").onclick = function(){
            document.getElementById("queryBox").style.display = "block";
            document.getElementById("resultBox").style.display = "none";
            document.getElementById("userNameInput").value = "";
            document.getElementById("zkzh").value = "";
            document.getElementById("id4").value = "";
            document.getElementById("vcode").value = "";
            createCode();
        }
    </script>
</body>
</html>
